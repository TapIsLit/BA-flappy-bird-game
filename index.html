<!DOCTYPE html>
<html>
<head>
<title>Flappy Characters</title>
<link rel="stylesheet" href="style.css">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<h1>Flappy Characters</h1>
  <marquee behavior="scroll" direction="left" scrollamount="6">
⭐ MADE BY TapIsLit and Phantom ⭐
</marquee>
<div id="menu">

<h2 id="com">Common 💩</h2>
<button class="common" onclick="startGame('Kaz','images/kaz.png')">Kaz</button>

<h2 id="unco">Uncommon </h2>
<button class="unco" onclick="startGame('charlie boi','images/charlie.png')">charlie boi</button>
<button class="unco" onclick="startGame('spengy','images/spengy.png')">spengy</button>
<button class="unco" onclick="startGame('raganarakku','images/ragnarakku.png')">raganarakku</button>
<button class="unco" onclick="startGame('Kenny','images/kenny.png')">Kenny</button>
<button class="unco" onclick="startGame('Clairri','images/clairri.png')">Clairri</button>
<button class="unco" onclick="startGame('LordHacker','images/lordhacker.png')">LordHacker</button>
<button class="unco" onclick="startGame('Jinn','images/jinn.png')">Jinn</button>

<h2 id="epic">Epic </h2>
<button class="epic" onclick="startGame('Xot','images/xot.png')">Xot</button>
<button class="epic" onclick="startGame('Ninja','images/ninja.png')">Ninja</button>
<button class="epic" onclick="startGame('Shariff','images/shariff.png')">Shariff</button>
<button  class="epic" onclick="startGame('Nekoshi','images/nekoshi.png')">Nekoshi</button>
<button class="epic" onclick="startGame('BloodxGoth','images/bloodxgoth.png')">BloodxGoth</button>
<button class="epic" onclick="startGame('Ace','images/ace.png')">Ace</button>

<h2 id="leg">Legendary </h2>
<button class="leg" onclick="startGame('Alexa','images/alexa.png')">Alexa</button>
<button class="leg" onclick="startGame('Phantom','images/phantom.png')">Phantom</button>
<button class="leg" onclick="startGame('MrAsaf','images/mrasaf.png')">MrAsaf</button>
<button class="leg" onclick="startGame('Mono','images/mono.png')">Mono</button>

<h2 id="myth">Mythic </h2>
<button class="myth" onclick="startGame('Frosty','images/frosty.png')">Frosty</button>
<button class="myth" onclick="startGame('TapIsGay','images/tapislit.png')">TapIsLit</button>

<h2 id="emp">Gods Chosen Emperors</h2>
<button class="emp" onclick="startGame('vitality','images/vity.png')">vitality </button>
<button class="emp" onclick="startGame('Clicky','images/clicky.png')">Clicky </button>

<h2 id="eter">Eternal</h2>
<button  class="eter" onclick="startGame('Leo','images/leo.png')">Leo </button>

</div>
<canvas id="game" width="400" height="600"></canvas>

<h2 id="score">Score: 0</h2>

<audio id="music" src="sounds/music.mp3" loop></audio>
<audio id="death" src="sounds/death.mp3"></audio>

<script src="script.js"></script>

</body>
</html>
